spring:
  application:
    name: config-service
  profiles:
    active: ${CONFIG_SERVER_PROFILE:native}
  cloud:
    config:
      server:
        native:
          search-locations: ${CONFIG_NATIVE_SEARCH_LOCATIONS:file:./config-repo,file:./backend/config-repo,file:../config-repo}
        git:
          uri: ${CONFIG_GIT_URI:https://example.com/replace-with-your-config-repo.git}
          default-label: ${CONFIG_GIT_DEFAULT_LABEL:main}
          clone-on-start: true
          username: ${CONFIG_GIT_USERNAME:}
          password: ${CONFIG_GIT_PASSWORD:}

server:
  port: ${CONFIG_SERVICE_PORT:8888}

eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
