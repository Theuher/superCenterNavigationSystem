spring:
  application:
    name: gateway-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  cloud:
    config:
      fail-fast: false
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service
              uri: ${AUTH_SERVICE_URI:http://auth-service:8081}
              predicates:
                - Path=/api/v1/auth/**
            - id: product-service
              uri: ${PRODUCT_SERVICE_URI:http://product-service:8082}
              predicates:
                - Path=/api/v1/products/**,/api/v1/categories/**
            - id: map-service
              uri: ${MAP_SERVICE_URI:http://map-service:8083}
              predicates:
                - Path=/api/v1/locations/**
            - id: user-service
              uri: ${USER_SERVICE_URI:http://user-service:8084}
              predicates:
                - Path=/api/v1/users/**

server:
  port: ${GATEWAY_SERVICE_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,mappings

eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://discovery-service:8761/eureka}
