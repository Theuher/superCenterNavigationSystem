server:
  port: ${GATEWAY_SERVICE_PORT:8080}

spring:
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service
              uri: http://auth-service:8081
              predicates:
                - Path=/api/v1/auth/**
            - id: product-service
              uri: http://product-service:8082
              predicates:
                - Path=/api/v1/products/**,/api/v1/categories/**
            - id: map-service
              uri: http://map-service:8083
              predicates:
                - Path=/api/v1/locations/**,/api/v1/floor-plans/**
            - id: user-service
              uri: http://user-service:8084
              predicates:
                - Path=/api/v1/users/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,mappings


