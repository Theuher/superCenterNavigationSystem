server:
  port: ${AUTH_SERVICE_PORT:8081}

spring:
  datasource:
    url: ${AUTH_DB_URL:jdbc:mysql://localhost:3306/auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${AUTH_DB_USERNAME:root}
    password: ${AUTH_DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

app:
  security:
    jwt:
      secret: ${JWT_SECRET:change-me-please-change-me-please-change-me-please-change-me}
      expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}
