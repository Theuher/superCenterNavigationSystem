name: Frontend CI/CD

on:
  pull_request:
    paths:
      - "frontend/store-navigation-frontend/**"
      - ".github/workflows/frontend.yml"
  push:
    branches: ["main"]
    paths:
      - "frontend/store-navigation-frontend/**"
      - ".github/workflows/frontend.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/store-navigation-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/store-navigation-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build


  docker-image:
    name: Build and Push Frontend Image
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize registry owner to lowercase
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend/store-navigation-frontend
          file: ./frontend/store-navigation-frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/scn-frontend:latest
            ghcr.io/${{ env.OWNER_LC }}/scn-frontend:${{ github.sha }}


  deploy:
    name: Deploy Frontend to Production
    runs-on: ubuntu-latest
    needs: docker-image
    if: github.event_name != 'pull_request'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd ~/superCenterNavigationSystem
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u theuher --password-stdin

            docker compose -f docker-compose.staging.yml pull frontend
            docker compose -f docker-compose.staging.yml up -d --no-deps frontend

            docker image prune -f