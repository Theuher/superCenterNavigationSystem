name: Backend Microservices CI/CD

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-microservices.yml"
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/backend-microservices.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  compile:
    name: Compile ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - discovery-service
          - config-service
          - auth-service
          - product-service
          - map-service
          - user-service
          - gateway-service
    defaults:
      run:
        working-directory: backend/${{ matrix.service }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Compile
        run: ./mvnw -DskipTests compile

  docker-images:
    name: Build and Push Backend Images
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: compile
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: discovery-service
            image: scn-discovery-service
          - service: config-service
            image: scn-config-service
          - service: auth-service
            image: scn-auth-service
          - service: product-service
            image: scn-product-service
          - service: map-service
            image: scn-map-service
          - service: user-service
            image: scn-user-service
          - service: gateway-service
            image: scn-gateway-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize registry owner to lowercase
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend/${{ matrix.service }}
          file: ./backend/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/${{ matrix.image }}:latest
            ghcr.io/${{ env.OWNER_LC }}/${{ matrix.image }}:${{ github.sha }}


