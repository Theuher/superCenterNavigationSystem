services:
  mysql:
    image: mysql:8.4
    container_name: scn-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    container_name: scn-mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_HOST_PORT:-27018}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  discovery-service:
    build:
      context: ./backend/discovery-service
      dockerfile: Dockerfile
    container_name: scn-discovery
    restart: unless-stopped
    environment:
      DISCOVERY_SERVICE_PORT: 8761
      EUREKA_DEFAULT_ZONE: http://discovery-service:8761/eureka
    ports:
      - "${DISCOVERY_HOST_PORT:-8762}:8761"

  config-service:
    build:
      context: ./backend/config-service
      dockerfile: Dockerfile
    container_name: scn-config
    restart: unless-stopped
    depends_on:
      - discovery-service
    environment:
      CONFIG_SERVICE_PORT: 8888
      CONFIG_SERVER_PROFILE: native
      CONFIG_NATIVE_SEARCH_LOCATIONS: file:/config-repo
      EUREKA_ENABLED: "true"
      EUREKA_DEFAULT_ZONE: http://discovery-service:8761/eureka
    ports:
      - "${CONFIG_HOST_PORT:-8889}:8888"
    volumes:
      - ./backend/config-repo:/config-repo:ro

  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    container_name: scn-auth
    restart: unless-stopped
    depends_on:
      - config-service
      - mysql
    environment:
      CONFIG_SERVER_URL: http://config-service:8888
      EUREKA_ENABLED: "true"
      EUREKA_DEFAULT_ZONE: http://discovery-service:8761/eureka
      AUTH_DB_URL: jdbc:mysql://mysql:3306/auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      AUTH_DB_USERNAME: root
      AUTH_DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:5174}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

  product-service:
    build:
      context: ./backend/product-service
      dockerfile: Dockerfile
    container_name: scn-product
    restart: unless-stopped
    depends_on:
      - config-service
      - mongodb
    environment:
      CONFIG_SERVER_URL: http://config-service:8888
      EUREKA_ENABLED: "true"
      EUREKA_DEFAULT_ZONE: http://discovery-service:8761/eureka
      PRODUCT_MONGO_URI: mongodb://mongodb:27017/supercenter_product_db
      SPRING_MONGODB_URI: mongodb://mongodb:27017/supercenter_product_db
      JWT_SECRET: ${JWT_SECRET}

  map-service:
    build:
      context: ./backend/map-service
      dockerfile: Dockerfile
    container_name: scn-map
    restart: unless-stopped
    depends_on:
      - config-service
      - mongodb
    environment:
      CONFIG_SERVER_URL: http://config-service:8888
      EUREKA_ENABLED: "true"
      EUREKA_DEFAULT_ZONE: http://discovery-service:8761/eureka
      MAP_MONGO_URI: mongodb://mongodb:27017/supercenter_map_db
      SPRING_MONGODB_URI: mongodb://mongodb:27017/supercenter_map_db
      JWT_SECRET: ${JWT_SECRET}

  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    container_name: scn-user
    restart: unless-stopped
    depends_on:
      - config-service
      - mysql
    environment:
      CONFIG_SERVER_URL: http://config-service:8888
      EUREKA_ENABLED: "true"
      EUREKA_DEFAULT_ZONE: http://discovery-service:8761/eureka
      USER_DB_URL: jdbc:mysql://mysql:3306/user_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      USER_DB_USERNAME: root
      USER_DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}

  gateway-service:
    build:
      context: ./backend/gateway-service
      dockerfile: Dockerfile
    container_name: scn-gateway
    restart: unless-stopped
    depends_on:
      - config-service
      - auth-service
      - product-service
      - map-service
      - user-service
    environment:
      CONFIG_SERVER_URL: http://config-service:8888
      EUREKA_ENABLED: "true"
      EUREKA_DEFAULT_ZONE: http://discovery-service:8761/eureka
    ports:
      - "${GATEWAY_HOST_PORT:-8088}:8080"

  frontend:
    build:
      context: ./frontend/store-navigation-frontend
      dockerfile: Dockerfile
    container_name: scn-frontend
    restart: unless-stopped
    depends_on:
      - gateway-service
    ports:
      - "${FRONTEND_HOST_PORT:-5174}:80"

volumes:
  mysql_data:
  mongo_data:
